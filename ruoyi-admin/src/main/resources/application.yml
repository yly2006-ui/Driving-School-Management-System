# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.8.8
  # 版权年份
  copyrightYear: 2024
  # 文件路径
  profile: ./uploadPath
  # 关键：配置服务器前缀，覆盖框架默认的本地地址
#  domain: http://mashang.eicp.vip:5555/ms_stu_pro339
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math


# 开发环境配置
server:
  # 服务器的HTTP端口，默认为11000
  # TODO：请改为本组项目组号，如项目123组改为 11123
  port: 11339
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

logging:
  level:
    root: info
    com.ruoyi: debug
    org.springframework: warn
    # 开启你的整个业务包日志（Controller+Service+Mapper）
    com.mashang.mashangdriving: debug
    # 单独开启MyBatis SQL打印（和上面重复，可保留，更保险）
    com.mashang.mashangdriving.mapper: DEBUG
    # 可选：开启MyBatis核心日志，确保SQL打印不遗漏
    org.mybatis: debug
    tk.mybatis: debug

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 原有配置保留
  mail:
    host: smtp.qq.com
    port: 465  # 465端口必须配SSL，587端口需改配置
    username: 3154563562@qq.com  # 比如 123456@qq.com
    password: pbaokaxrkvogddcj     # 不是QQ密码！
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true  # 465端口必须开启SSL
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465     # 显式指定SSL端口
          starttls:
            enable: false # 465端口关闭STARTTLS，587端口才需要true
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    # TODO：若需要修改文件上传大小限制，自行修改；
    ## 注意：并同时修改 /ruoyi-common/src/main/java/com/ruoyi/common/utils/file/FileUploadUtils.java中的【DEFAULT_MAX_SIZE】值
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  # redis 配置
  redis:
    # 地址
    host: localhost
    # 端口，默认为6379
    port: 6379
    # 数据库索引
    database: 0
    # 密码
    password:
    # 连接超时时间
    timeout: 10s
    lettuce:
      pool:
        # 连接池中的最小空闲连接
        min-idle: 0
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接数
        max-active: 8
        # #连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher


# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis-plus:
  # 搜索指定包别名
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain.**,com.mashang.**.domain.**
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml
  global-config:
    db-config:
      logic-delete-field: delFlag # 全局逻辑删除字段名(deleted为实体类属性名称)
      logic-delete-value: 2 # 逻辑已删除值。可选，默认值为 1
      logic-not-delete-value: 0 # 逻辑未删除值。可选，默认值为 0


# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: true
  # 请求前缀
  pathMapping: /

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*
alipay:
  appId: 9021000151615886
  merchantPrivateKey: 
  alipayPublicKey: 
  notifyUrl: http://y79746ba.natappfree.cc/financial/management/notify
  returnUrl: http://member.zyz.com/memberOrder.html
  signType: RSA2
  charset: utf-8
  # 我的支付宝网关地址
  gatewayUrl: https://openapi-sandbox.dl.alipaydev.com/gateway.do
